  <div id="status"></div>
  <div id="results"></div>
</div>

  </div>
</div>

const NICK = [
  [/\bzard\b/g,"charizard"],[/\bpika\b/g,"pikachu"],[/\bgard\b/g,"gardevoir"],
  [/\bgyara\b/g,"gyarados"],[/\bgren\b/g,"greninja"],[/\bttar\b/g,"tyranitar"],
  [/\blax\b/g,"snorlax"],[/\blucar\b/g,"lucario"],[/\bmence\b/g,"salamence"],
  [/\bchomp\b/g,"garchomp"],[/\bdnite\b/g,"dragonite"]
];
const TYPES = {fire:"Fire",water:"Water",grass:"Grass",lightning:"Lightning",electric:"Lightning",
  psychic:"Psychic",fighting:"Fighting",darkness:"Darkness",dark:"Darkness",metal:"Metal",steel:"Metal",
  dragon:"Dragon",fairy:"Fairy",colorless:"Colorless",normal:"Colorless"};
const TYPE_COLOR = {Fire:"#ff7043",Water:"#4fc3f7",Grass:"#7cc576",Lightning:"#ffd54f",Psychic:"#ba68c8",
  Fighting:"#d4a05a",Darkness:"#78909c",Metal:"#b0bec5",Dragon:"#cyan",Fairy:"#f06292",Colorless:"#cfd8dc"};
// set codes from the data; skip codes that are also Pokemon names
let NAMESET = new Set(), NUMSETS = new Set(), SET_NAMES = [];
const SET_CODES = {};
let ABBR = new Map();   // unique 3-4 char prefix -> full Pokemon name  (e.g. "zek" -> "zekrom")
let PHON = new Map();   // phonetic key -> Set(base name)  (sounds-like fallback for misspellings)
function phonKey(s){    // rough sounds-like skeleton: consonant frame, spelling-error tolerant
  s=(s||"").toLowerCase().replace(/[^a-z]/g,"");
  if(!s) return "";
  s=s.replace(/ph/g,"f").replace(/gh/g,"g").replace(/ck/g,"k").replace(/wh/g,"w").replace(/qu/g,"kw").replace(/x/g,"ks")
     .replace(/c(?=[eiy])/g,"s").replace(/c/g,"k").replace(/z/g,"s").replace(/y/g,"i");
  const first=s[0];
  const rest=s.slice(1).replace(/h/g,"").replace(/[aeiou]/g,"");   // drop non-initial h + vowels
  return (first+rest).replace(/(.)\1+/g,"$1");                     // collapse doubled letters
}
function buildVocab(){
  const pool = CARDS.filter(c=>(c.game||"pkmn")===GAME);
  NAMESET = new Set(pool.map(c=>c.n.toLowerCase()));
  for(const k in SET_CODES) delete SET_CODES[k];
  pool.forEach(c=>{ if(c.c) SET_CODES[c.c.toLowerCase()] = c.s; });
  NUMSETS = new Set(pool.filter(c=>/^\d+$/.test(c.s)).map(c=>c.s));
  SET_NAMES = [...new Set(pool.map(c=>c.s))].filter(s=>s.length>=4 && !/^\d+$/.test(s)).sort((a,b)=>b.length-a.length);
  // build prefix->name map from the current game's names; keep only prefixes that resolve to ONE name
  ABBR = new Map();
  const counts = new Map();
  for(const c of pool){
    if(c.sealed) continue;
    if(GAME==="pkmn" && (c.lang||"en")!=="en") continue;   // pokemon abbreviations from EN names only
    const base = (c.n||"").toLowerCase().split(/\s+/)[0].replace(/[^a-z]/g,"");
    if(base.length<5) continue;                       // only abbreviate names long enough to bother
    for(const L of [3,4]){ if(base.length<=L) continue; const pre=base.slice(0,L);
      if(!counts.has(pre)) counts.set(pre,new Set()); counts.get(pre).add(base); }
  }
  for(const [pre,set] of counts){ if(set.size===1) ABBR.set(pre,[...set][0]); }
  PHON = new Map();
  for(const c of pool){
    if(c.sealed) continue;
    if(GAME==="pkmn" && (c.lang||"en")!=="en") continue;
    const base=(c.n||"").toLowerCase().split(/\s+/)[0].replace(/[^a-z]/g,"");
    if(base.length<4) continue;
    const k=phonKey(base); if(!k) continue;
    if(!PHON.has(k)) PHON.set(k,new Set()); PHON.get(k).add(base);
  }
}

// Rarities the Full Art toggle keeps. Edit freely — this is the whole definition.
const CHASE_EN = new Set([
  // SV modern: full/alt art + gold "and above" (NOT Double Rare, NOT base parallels)
  "Illustration Rare","Special Illustration Rare","Ultra Rare","Hyper Rare","Mega Hyper Rare","MEGA_ATTACK_RARE","Shiny Ultra Rare",
  // BW–SWSH Full Art tier + rainbow/secret + alt-art subsets
  "Rare Ultra","Rare Rainbow","Rare Secret","Trainer Gallery Rare Holo","Amazing Rare",
  // genuine full-panel + iconic vintage chase kept by choice (Gold Star, Level X)
  "LEGEND","Rare Holo Star","Rare Holo LV.X",
  // JP-style full-art labels that appear on EN standalones
  "Special Art Rare","Art Rare","Character Rare","Character Super Rare"
  // dropped (framed, not full art): Rare Holo GX, Rare Holo EX, Rare Prime, Rare ACE,
  //   Rare Shining, Rare Shiny, Shiny Rare, Rare Shiny GX, Radiant Rare — re-add if wanted
]);
const JP_CHASE = /\b(SR|SAR|AR|UR|HR|CHR|CSR|SSR|RRR|ACE|K)\b|art rare|super rare|ultra rare|hyper rare|character (?:super )?rare|amazing rare|shiny/i;
const LORCANA_CHASE = new Set(["Enchanted","Legendary","Super Rare"]);
function isChase(c){
  const r=c.r||"", n=c.n||"";
  if((c.game||"pkmn")==="lorcana") return LORCANA_CHASE.has(r) || /enchanted/i.test(r);
  if(/\b(full art|alt(?:ernate)? art)\b/i.test(n)) return true;   // name-stamped full arts (promos etc.)
  if((c.lang||"en")==="jp") return JP_CHASE.test(r);
  return CHASE_EN.has(r);   // explicit list only — plain "Rare Holo" is NOT full art
}
const SET_NICK = {"prismatic":"Prismatic Evolutions","destined rivals":"Destined Rivals","silver tempest":"Silver Tempest","twilight masquerade":"Twilight Masquerade","furious fists":"Furious Fists","team rocket returns":"Team Rocket Returns","legendary collection":"Legendary Collection","base set 2":"Base Set 2","neo genesis":"Neo Genesis","neo destiny":"Neo Destiny","gym heroes":"Gym Heroes","gym challenge":"Gym Challenge"};

function parse(raw){
  let text = " " + raw.toLowerCase().trim() + " ";
  const f = {hp:null,type:null,stage:null,subtype:null,delta:null,eraMin:null,eraMax:null,number:null,setCode:null,setName:null,rarity:null,jp:null,note:[],exp:[]};
  NICK.forEach(([re,v])=>{ if(re.test(text)){ f.exp.push(v); text = text.replace(re," "+v+" "); } });
  const qFull = text.replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(Boolean).join(" ");
  if(/\bdelta( species)?\b|δ/.test(text)){ f.delta=true; text=text.replace(/\bdelta( species)?\b|δ/g," "); }

  // set: ptcgo code, nickname, full name  (rarity shorthands are reserved so they can't be read as a set code)
  const RAR_CODES = new Set(["dr","ir","sir","ur","hr","rr","sr","ar","sar"]);
  for(const code in SET_CODES){ if(code.length>=2 && !RAR_CODES.has(code) && !NAMESET.has(code) && text.includes(" "+code+" ")){ f.setCode=code; text=text.replace(new RegExp("\\b"+code+"\\b","g")," "); break; } }
  if(!f.setName){ for(const k in SET_NICK){ if(text.includes(k)){ f.setName=SET_NICK[k]; text=text.replace(k," "); break; } } }
  if(!f.setName){ for(const nm of SET_NAMES){ const re=new RegExp("\\b"+nm.toLowerCase().replace(/[^a-z0-9 ]/g,".")+"\\b"); if(re.test(text)){ f.setName=nm; text=text.replace(re," "); break; } } }

  let m = text.match(/\b(\d{2,3})\s*hp\b/) || text.match(/\bhp\s*(\d{2,3})\b/);
  if(m){ f.hp=+m[1]; text=text.replace(m[0]," "); }
  m = text.match(/\b(fire|water|grass|lightning|electric|psychic|fighting|darkness|dark|metal|steel|dragon|fairy|colorless|normal)\b/);
  if(m){ f.type=TYPES[m[1]]; text=text.replace(m[0]," "); }

  if(/\bstage\s*2\b/.test(text)){ f.stage="Stage 2"; text=text.replace(/\bstage\s*2\b/g," "); }
  else if(/\bstage\s*1\b/.test(text)){ f.stage="Stage 1"; text=text.replace(/\bstage\s*1\b/g," "); }
  else if(/\bvstar\b/.test(text)){ f.stage="VSTAR"; text=text.replace(/\bvstar\b/g," "); }
  else if(/\bvmax\b/.test(text)){ f.stage="VMAX"; text=text.replace(/\bvmax\b/g," "); }
  else if(/\btera\b/.test(text)){ f.stage="Tera"; text=text.replace(/\btera\b/g," "); }
  else if(/\bbasic\b/.test(text)){ f.stage="Basic"; text=text.replace(/\bbasic\b/g," "); }

  const SUB = [[/\bbaby\b/,"Baby"],[/\bgold star\b|\bstar\b/,"Star"],[/\bbreak\b/,"BREAK"],[/\bancient\b/,"Ancient"],[/\bfuture\b/,"Future"],[/\bmega\b/,"MEGA"],[/\bgx\b/,"GX"],[/\bprism star\b|\bprism\b/,"Prism Star"],[/\btag team\b/,"TAG TEAM"],[/\bultra beast\b|\bub\b/,"Ultra Beast"],[/\bsingle strike\b/,"Single Strike"],[/\brapid strike\b/,"Rapid Strike"],[/\bfusion( strike)?\b/,"Fusion"]];
  for(const [re,st] of SUB){ if(re.test(text)){ f.subtype=st; text=text.replace(re," "); break; } }

  if(/\b(vintage|wotc|old|classic)\b/.test(text)){ f.eraMax=2003; text=text.replace(/\b(vintage|wotc|old|classic)\b/g," "); }
  if(/\b(modern|new|recent)\b/.test(text)){ f.eraMin=2020; text=text.replace(/\b(modern|new|recent)\b/g," "); }

  // finishes & printings -> deferred to price layer (recognized, not filtered here)
  const FIN = [
    [/\b(1st|first)\s?edition\b/,"1st Edition",()=>{f.eraMax=2002;}],
    [/\bshadowless\b/,"shadowless"],[/\bunlimited\b/,"unlimited"],
    [/\breverse(\s?holo)?\b/,"reverse holo"],[/\bnon[\s-]?holo\b/,"non-holo"],
    [/\brare holo\b/,"holo"],[/\bholo(foil)?\b/,"holo"],
    [/\bcosmos( holo)?\b/,"cosmos holo"],[/\bcracked ice\b/,"cracked ice"],
    [/\b(master\s?ball|poke\s?ball|pok[eé]\s?ball|pokeball)\b/,"Master/Poké Ball pattern"],
    [/\b(pre[\s-]?release|prerelease)\b/,"prerelease"],[/\bstaff\b/,"staff stamp"],
    [/\b(league|stamped|stamp)\b/,"stamp"],[/\b(jumbo|oversized)\b/,"jumbo"],
    [/\b(error|miscut|misprint)\b/,"error/misprint"]
  ];
  for(const [re,lab,fx] of FIN){ if(re.test(text)){ if(/master|poke|pok/.test(re.source)){ if(!text.replace(re," ").replace(/[^a-z0-9]+/g,"").length) continue; } if(fx) fx(); f.note.push(lab+" → printing (price layer)"); text=text.replace(re," "); } }

  // grading / condition -> comp source, not identity
  m = text.match(/\b(psa|bgs|cgc|sgc)\s?(10|9\.5|9|8\.5|8|7|6|5|4|3|2|1)?\b/);
  if(m){ f.note.push(m[0].toUpperCase().replace(/\s+/g," ").trim()+" → graded (eBay-sold comps)"); text=text.replace(m[0]," "); }
  if(/\b(graded|slab|gem mint)\b/.test(text)){ f.note.push("graded → eBay-sold comps"); text=text.replace(/\b(graded|slab|gem mint)\b/g," "); }
  if(/\b(raw|ungraded)\b/.test(text)){ f.note.push("raw"); text=text.replace(/\b(raw|ungraded)\b/g," "); }
  const cm = text.match(/\b(near mint|lightly played|moderately played|heavily played|damaged)\b/);
  if(cm){ f.note.push(cm[1]+" → condition (price layer)"); text=text.replace(cm[0]," "); }

  // Japanese rarity codes -> filter JP results by rarity (only when already in JP mode).
  // Carries the code to match against the card's rarity field, so e.g. "ar" can never mean a Pokémon.
  if(LANG==="jp"){
    const JPR = [
      [/\bspecial art rare\b|\bsar\b/, "SAR", "Special Art Rare"],
      [/\bart rare\b|\bar\b/,          "AR",  "Art Rare"],
      [/\bsuper rare\b|\bsr\b/,        "SR",  "Super Rare"],
      [/\bultra rare\b|\bur\b/,        "UR",  "Ultra Rare"],
      [/\bhyper rare\b|\bhr\b/,        "HR",  "Hyper Rare"],
      [/\bcharacter super rare\b|\bcsr\b/, "CSR", "Character Super Rare"],
      [/\bcharacter rare\b|\bchr\b/,   "CHR", "Character Rare"],
      [/\btriple rare\b|\brrr\b/,      "RRR", "Triple Rare"],
      [/\bdouble rare\b|\brr\b/,       "RR",  "Double Rare"]
    ];
    for(const [re,code,full] of JPR){ if(re.test(text)){ f.jp={code,full,label:full}; text=text.replace(re," "); break; } }
  }

  // alt art -> Sword & Shield era
  if(/\b(alt art|alternate art|aa)\b/.test(text)){ f.eraMin=2020; f.eraMax=2022; f.note.push("alt art → SWSH era (exact variant at price layer)"); text=text.replace(/\b(alt art|alternate art|aa)\b/g," "); }

  // English rarities
  const RAR = [
    [/\bace spec\b|\bace\b/, {label:"ACE SPEC", has:"ACE SPEC"}],
    [/\bspecial illustration rare\b|\bsir\b/, {label:"Special Illustration Rare", eq:"Special Illustration Rare"}],
    [/\bfull art\b/, {label:"Full Art", anyOf:["Rare Ultra","Ultra Rare"]}],
    [/\billustration rare\b|\bir\b/, {label:"Illustration Rare", eq:"Illustration Rare"}],
    [/\bdouble rare\b|\bdr\b|\brr\b/, {label:"Double Rare", eq:"Double Rare"}],
    [/\bultra rare\b|\bultra\b|\bur\b/, {label:"Ultra Rare", eq:"Ultra Rare"}],
    [/\bhyper rare\b|\bhr\b|\bgold\b/, {label:"Hyper Rare", eq:"Hyper Rare"}],
    [/\brainbow\b/, {label:"Rainbow", has:"Rainbow"}],
    [/\bsecret( rare)?\b/, {label:"Secret Rare", has:"Secret"}],
    [/\bradiant\b/, {label:"Radiant", has:"Radiant"}],
    [/\bshiny\b|\bshining\b/, {label:"Shining", has:"Shining"}],
    [/\bamazing( rare)?\b/, {label:"Amazing Rare", has:"Amazing"}],
    [/\bprime\b/, {label:"Prime", has:"Prime"}],
    [/\blegend\b/, {label:"LEGEND", eq:"LEGEND"}],
    [/\btrainer gallery\b|\btg\b/, {label:"Trainer Gallery", has:"Trainer Gallery"}],
    [/\bpromos?\b/, {label:"Promo", eq:"Promo"}],
    [/\buncommon\b/, {label:"Uncommon", eq:"Uncommon"}],
    [/\bcommon\b/, {label:"Common", eq:"Common"}],
    [/\brare\b/, {label:"Rare", eq:"Rare"}]
  ];
  for(const [re,mm] of RAR){ if(re.test(text)){ f.rarity=mm; text=text.replace(re," "); break; } }

  m = text.match(/#\s*([a-z]{0,3}\d{1,3}[a-z]?)\b/) || text.match(/\b(\d{1,3})\s*\/\s*\d{1,3}\b/);
  if(m){ f.number=m[1]; text=text.replace(m[0]," "); }
  else { const bm = text.match(/\b(\d{1,3})\b/); if(bm){ if(NUMSETS.has(bm[1])) f.setName=bm[1]; else f.number=bm[1]; text=text.replace(bm[0]," "); } }
  const q = text.replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(Boolean)
    .map(tok => (tok.length>=3 && tok.length<=4 && !NAMESET.has(tok) && ABBR.has(tok)) ? ABBR.get(tok) : tok)
    .join(" ");
  return {q,qFull,f};
}

/* ---------- index ---------- */
let ms = null;
function buildIndex(){
  ms = new MiniSearch({
    fields:["n","atk","s","kind"],
    storeFields:["n","sup","s","c","y","num","r","hp","t","st","atk","img","lang","game","px","pid","sealed","kind","o"],
    searchOptions:{ boost:{n:3,atk:2}, fuzzy: t => t.length>4 ? 0.2 : false, prefix: t => t.length>=3 }
  });
  ms.addAll(CARDS);
}

/* ---------- search ---------- */
function run(raw){
  const {q,qFull,f} = parse(raw);
  if(f.jp){ setLang("jp", true); }
  // read-as line
  const bits = [];
  if(f.exp.length) bits.push("→ "+f.exp.join(", "));
  if(f.setCode) bits.push(SET_CODES[f.setCode]);
  if(f.setName) bits.push(f.setName);
  if(f.type) bits.push(f.type);
  if(f.hp!=null) bits.push(f.hp+" HP (±20)");
  if(f.stage) bits.push(f.stage);
  if(f.subtype) bits.push(f.subtype);
  if(f.delta) bits.push("δ Delta Species");
  if(f.rarity) bits.push(f.rarity.label);
  if(f.jp) bits.push(f.jp.label+" ("+f.jp.code+")");
  if(f.number) bits.push("#"+f.number);
  if(f.eraMax) bits.push("≤"+f.eraMax);
  if(f.eraMin) bits.push("≥"+f.eraMin);
  const noteStr = f.note.length ? ("  <span style='color:var(--faint)'>· "+f.note.join(" · ")+"</span>") : "";
  $("#read").innerHTML = (q||bits.length||f.note.length) ? ("read as: " + (q?('"'+q+'"'):"(no name)") + (bits.length?("  <span class='f'>· "+bits.join(" · ")+"</span>"):"") + noteStr) : "";

  const tlc = f.type && f.type.toLowerCase();
  const slc = f.stage && f.stage.toLowerCase();
  const passFilters = r => {
    if((r.game||"pkmn")!==GAME) return false;
    if(GAME==="pkmn" && (r.lang||"en")!==LANG) return false;
    if(SEALED_ONLY){ if(!r.sealed) return false; }
    else { if(r.sealed) return false; if(FA_ONLY && !isChase(r)) return false; }
    if(tlc && !(r.t||[]).map(x=>x.toLowerCase()).includes(tlc)) return false;
    if(f.hp!=null){ const h=parseInt(r.hp)||0; if(!h || Math.abs(h-f.hp)>20) return false; }
    if(slc && !(r.st||[]).map(x=>x.toLowerCase()).includes(slc)) return false;
    if(f.subtype && !(r.st||[]).map(x=>x.toLowerCase()).includes(f.subtype.toLowerCase())) return false;
    if(f.delta && !(r.n||"").includes("δ")) return false;
    if(f.eraMax!=null && r.y>f.eraMax) return false;
    if(f.eraMin!=null && r.y<f.eraMin) return false;
    if(f.setCode && (r.c||"").toLowerCase()!==f.setCode) return false;
    if(f.setName && (r.s||"")!==f.setName) return false;
    if(f.rarity){ const rr=r.r||""; const ok = f.rarity.anyOf ? f.rarity.anyOf.includes(rr) : (f.rarity.eq ? rr===f.rarity.eq : rr.includes(f.rarity.has)); if(!ok) return false; }
    if(f.jp){ const rr=r.r||""; const toks=rr.toUpperCase().split(/[^A-Z0-9]+/).filter(Boolean); if(!(toks.includes(f.jp.code) || rr.trim().toLowerCase()===f.jp.full.toLowerCase())) return false; }
    if(f.number){ const n=String(r.num).toLowerCase(); const want=String(f.number).toLowerCase(); if(n!==want && !n.startsWith(want)) return false; }
    return true;
  };

  let res, literal=false;
  if(q){
    res = ms.search(q,{combineWith:"AND"}).filter(passFilters);
    if(!res.length) res = ms.search(q).filter(passFilters);
    if(!res.length && qFull && qFull!==q){ res = ms.search(qFull).filter(r=>(r.lang||"en")===LANG && (SEALED_ONLY? !!r.sealed : !r.sealed) && (SEALED_ONLY || !FA_ONLY || isChase(r))); literal=true; }   // name/keyword collision safety net
    if(res.length < 4){   // sounds-like fallback for misspellings beyond fuzzy's reach
      const seen=new Set(res.map(r=>r.id)), names=new Set();
      for(const t of q.split(/\s+/)){ if(t.length<4) continue; const hit=PHON.get(phonKey(t)); if(hit) hit.forEach(n=>names.add(n)); }
      for(const nm of [...names].slice(0,6)){ ms.search(nm).filter(passFilters).forEach(r=>{ if(!seen.has(r.id)){ seen.add(r.id); res.push(r); } }); }
    }
  } else {
    res = CARDS.map(c=>({...c, score:1})).filter(passFilters);
  }
  // relevance-first when the *typed query* has a discriminating signal; newest-first for a bare name.
  // FA toggle is a mode, not a query qualifier, so it must NOT flip the sort.
  const hasFilter = !!(f.setCode||f.setName||f.type||f.hp!=null||f.stage||f.subtype||f.delta||f.eraMin!=null||f.eraMax!=null||f.rarity||f.number||f.jp);
  render(res, literal, !hasFilter);
}

function render(res, literal, newestFirst){
  const wrap = $("#results"); wrap.innerHTML = "";
  // bare name / empty -> newest wins, relevance breaks ties. Qualified query -> relevance wins, newest breaks ties.
  res = res.slice().sort(newestFirst
    ? (a,b)=>((b.y||0)-(a.y||0)) || ((b.o||0)-(a.o||0)) || ((b.score||0)-(a.score||0))
    : (a,b)=>((b.score||0)-(a.score||0)) || ((b.y||0)-(a.y||0)) || ((b.o||0)-(a.o||0)));
  $("#status").textContent = res.length ? (res.length + " match" + (res.length>1?"es":"") + (literal?"  · no exact filter match — closest by name":"")) : "no matches — try fewer words, or just the Pokémon name";
  res.slice(0,16).forEach(r=>{
    const el = document.createElement("div"); el.className = "card"; el.dataset.id = r.id;
    const rb = rowBid(r);
    const bidHTML = rb!=null ? `<div style="flex-shrink:0;text-align:right;white-space:nowrap;align-self:center"><div style="font-size:10px;color:var(--faint);line-height:1">max bid</div><b class="cpy" data-bid="${rb.toFixed(2)}" title="tap to copy" style="color:var(--gold);font-size:16px;cursor:pointer">$${rb.toFixed(2)}</b></div>` : "";
    el.innerHTML = `
      <div class="row">
        <img src="${r.img}" loading="lazy" alt="" onerror="this.classList.add('noimg')">
        <div class="meta">
          <div class="nm">${r.n}</div>
          <div class="tags">${r.sealed
            ? `<b>${r.s}</b> · 📦 ${r.kind||"sealed"}`
            : `<b>${r.s}</b> ${r.c?("· "+r.c):""} · #${r.num} · ${r.r||"—"}`}</div>
        </div>
        ${bidHTML}
      </div>
      <div class="detail"></div>`;
    const row = el.querySelector(".row"), det = el.querySelector(".detail");
    row.onclick = () => { const qel=$("#q"); if(qel) qel.blur(); const open = el.classList.toggle("open"); if(open && !det.dataset.loaded){ det.dataset.loaded="1"; loadPrices(r, det); } };
    const im = el.querySelector("img");
    if(im) im.onclick = (e)=>{ e.stopPropagation(); zoom((r.img||"").replace(/\.png$/,"_hires.png")); };
    el.querySelectorAll(".row .cpy").forEach(c=>c.onclick=(e)=>{ e.stopPropagation(); copyAmt(c.dataset.bid, c); });
    wrap.appendChild(el);
  });
}

/* ---------- wiring ---------- */
let t=null;
$("#q").addEventListener("input", e=>{ clearTimeout(t); $("#qclear").style.display = e.target.value?"block":"none"; t=setTimeout(()=>run(e.target.value), 110); });
$("#q").addEventListener("focus", e=>{ try{ e.target.select(); }catch(_){} });
$("#q").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); clearTimeout(t); run(e.target.value); e.target.blur(); } });
$("#qclear").onclick = ()=>{ $("#q").value=""; $("#qclear").style.display="none"; $("#results").innerHTML=""; $("#read").innerHTML=""; $("#status").textContent=""; $("#q").focus(); };

/* settings: persist (safe if storage blocked), toggle, zoom close */
function saveCfg(){ try{ const o={}; document.querySelectorAll("#settings input").forEach(i=>o[i.id||("m_"+i.dataset.c)]=(i.type==="checkbox"?i.checked:i.value)); localStorage.setItem("cardcomp_cfg",JSON.stringify(o)); }catch(e){} }
function loadCfg(){ try{ const o=JSON.parse(localStorage.getItem("cardcomp_cfg")||"{}"); document.querySelectorAll("#settings input").forEach(i=>{ const k=i.id||("m_"+i.dataset.c); if(o[k]!=null){ if(i.type==="checkbox") i.checked=!!o[k]; else if(o[k]!=="") i.value=o[k]; } }); }catch(e){} }
loadCfg();
document.querySelectorAll("#settings input").forEach(i=>i.addEventListener("change", ()=>{ saveCfg(); renderCart(); }));
$("#gear").onclick = ()=> $("#settings").classList.toggle("open");
$("#zoom").onclick = ()=> $("#zoom").classList.remove("open");

$("#q").focus();
document.querySelectorAll("#langtoggle button").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
document.querySelectorAll("#gametoggle button").forEach(b=>b.onclick=()=>setGame(b.dataset.game));
function paintToggles(){
  const fb=$("#fatoggle"), sb=$("#sealedtoggle");
  const p=(el,on)=>{ if(!el)return; el.style.borderColor=on?"var(--gold)":"var(--line)"; el.style.color=on?"var(--ink)":"var(--dim)"; el.style.background=on?"rgba(245,179,1,.10)":"var(--panel2)"; };
  p(fb,FA_ONLY); p(sb,SEALED_ONLY);
}
(function(){
  const fb=$("#fatoggle"), sb=$("#sealedtoggle");
  if(fb) fb.onclick=()=>{ FA_ONLY=!FA_ONLY; if(FA_ONLY) SEALED_ONLY=false; paintToggles(); if(window.__ready) run($("#q").value); };
  if(sb) sb.onclick=()=>{ SEALED_ONLY=!SEALED_ONLY; if(SEALED_ONLY) FA_ONLY=false; paintToggles(); if(window.__ready) run($("#q").value); };
})();
setLang((()=>{ try{ return localStorage.getItem("cardcomp_lang"); }catch(e){ return null; } })()||"en", true);
loadCart(); renderCart();
$("#cartclear").onclick = clearCart;
$("#cartsum").onclick = ()=>{ const it=$("#cartitems"); it.style.display = (it.style.display==="none"?"block":"none"); };
boot();
</script>
