name: Refresh prices

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node ingest.js
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json 
          git commit -m "Update prices" || echo "no changes"
          git push
